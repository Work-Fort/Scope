# SPDX-License-Identifier: Apache-2.0
name: Release CLI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'web/**'

permissions:
  contents: write

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
      should_release: ${{ steps.check_tag.outputs.should_release }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag_version
        uses: Work-Fort/github-tag-action@v6.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: master
          tag_prefix: v

      - name: Check if new tag was created
        id: check_tag
        run: |
          if [ -n "$TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ steps.tag_version.outputs.new_tag }}

  build:
    name: Build CLI (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: tag
    if: needs.tag.outputs.should_release == 'true'

    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: jdx/mise-action@v3

      - name: Build release binary
        run: mise run build:release

      - name: Compress and generate checksum
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p build
          cp target/release/scope-server "build/workfort-linux-${ARCH}"
          cd build
          xz -z -9 "workfort-linux-${ARCH}"
          sha256sum "workfort-linux-${ARCH}.xz" > "workfort-linux-${ARCH}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.arch }}-${{ needs.tag.outputs.new_tag }}
          path: |
            build/workfort-linux-${{ matrix.arch }}.xz
            build/workfort-linux-${{ matrix.arch }}.sha256
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [tag, build]
    if: needs.tag.outputs.should_release == 'true'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: cli-*-${{ needs.tag.outputs.new_tag }}
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd release-artifacts
          cat *.sha256 > SHA256SUMS
          rm *.sha256

      - name: Create release notes
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          CHANGELOG: ${{ needs.tag.outputs.changelog }}
          REPO: ${{ github.repository }}
        run: |
          VERSION=$(echo "$TAG" | sed 's/^v//')

          cat > release-notes.md << EOF
          # Scope v${VERSION}

          ## What's Changed

          ${CHANGELOG}

          ## Installation

          ### Linux (x86_64)
          \`\`\`bash
          wget https://github.com/${REPO}/releases/download/${TAG}/workfort-linux-amd64.xz
          xz -d workfort-linux-amd64.xz
          chmod +x workfort-linux-amd64
          sudo mv workfort-linux-amd64 /usr/local/bin/workfort
          \`\`\`

          ### Linux (ARM64)
          \`\`\`bash
          wget https://github.com/${REPO}/releases/download/${TAG}/workfort-linux-arm64.xz
          xz -d workfort-linux-arm64.xz
          chmod +x workfort-linux-arm64
          sudo mv workfort-linux-arm64 /usr/local/bin/workfort
          \`\`\`

          ### Arch Linux (AUR)
          \`\`\`bash
          yay -S workfort
          \`\`\`

          ## Verification

          \`\`\`bash
          wget https://github.com/${REPO}/releases/download/${TAG}/SHA256SUMS
          sha256sum -c SHA256SUMS --ignore-missing
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: Release ${{ needs.tag.outputs.new_tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/workfort-linux-amd64.xz
            release-artifacts/workfort-linux-arm64.xz
            release-artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: [tag, release]
    if: needs.tag.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Update PKGBUILD
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          REPO: ${{ github.repository }}
        run: |
          VERSION=$(echo "$TAG" | sed 's/^v//')
          wget -q "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz" -O source.tar.gz
          SRC_SUM=$(sha256sum source.tar.gz | cut -d' ' -f1)

          cd aur
          sed -i "s/pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/sha256sums=.*/sha256sums=('${SRC_SUM}')/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v "$PWD/aur:/pkg" archlinux:latest bash -c '
            pacman -Sy --noconfirm base-devel >/dev/null 2>&1
            useradd -m builder
            chown -R builder:builder /pkg
            su builder -c "cd /pkg && makepkg --printsrcinfo > .SRCINFO"
          '

      - name: Push to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          mkdir -p ~/.ssh
          echo "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key"

          git clone ssh://aur@aur.archlinux.org/workfort.git aur-repo
          cp aur/PKGBUILD aur/.SRCINFO aur-repo/

          cd aur-repo
          git config user.name "Kaz Walker"
          git config user.email "me@kazatron.com"
          git add PKGBUILD .SRCINFO
          if ! git diff --cached --quiet; then
            VERSION=$(echo "$TAG" | sed 's/^v//')
            git commit -m "Update to v${VERSION}"
            git push
          fi
