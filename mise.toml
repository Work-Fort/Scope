[tools]
go = "latest"
cmake = "latest"

[env]
BINARY_NAME = "workfort"
BUILD_DIR = "build"

[tasks."whisper:setup"]
description = "Clone and build whisper.cpp static libraries"
run = """
WHISPER_TAG="v1.8.3"
WHISPER_DIR="$PWD/third_party/whisper.cpp"
if [ ! -d "$WHISPER_DIR" ]; then
  git clone --depth 1 --branch "$WHISPER_TAG" https://github.com/ggml-org/whisper.cpp.git "$WHISPER_DIR"
fi
if [ ! -f "$WHISPER_DIR/build/src/libwhisper.a" ]; then
  cmake -S "$WHISPER_DIR" -B "$WHISPER_DIR/build" \
    -DCMAKE_BUILD_TYPE=Release \
    -DBUILD_SHARED_LIBS=OFF
  cmake --build "$WHISPER_DIR/build" --target whisper -- -j$(nproc)
fi
"""

[tasks.build]
description = "Build the workfort binary"
depends = ["whisper:setup"]
sources = ["**/*.go", "go.mod", "go.sum"]
outputs = ["{{env.BUILD_DIR}}/{{env.BINARY_NAME}}"]
run = """
mkdir -p ${BUILD_DIR}
WHISPER_DIR="$PWD/third_party/whisper.cpp"
VERSION=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
C_INCLUDE_PATH="$WHISPER_DIR/include:$WHISPER_DIR/ggml/include" \
LIBRARY_PATH="$WHISPER_DIR/build/src:$WHISPER_DIR/build/ggml/src" \
CGO_LDFLAGS="-L$WHISPER_DIR/build/src -L$WHISPER_DIR/build/ggml/src -Wl,-Bstatic -lwhisper -lggml -lggml-base -lggml-cpu -Wl,-Bdynamic -lm -lstdc++ -fopenmp" \
CGO_ENABLED=1 \
go build -ldflags "-X github.com/Work-Fort/WorkFort/cmd.Version=${VERSION}" -o ${BUILD_DIR}/${BINARY_NAME} .
"""

[tasks."build:release"]
description = "Build a static release binary"
sources = ["**/*.go", "go.mod", "go.sum"]
outputs = ["{{env.BUILD_DIR}}/{{env.BINARY_NAME}}"]
run = """
mkdir -p ${BUILD_DIR}
VERSION=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
go build -ldflags "-s -w -X github.com/Work-Fort/WorkFort/cmd.Version=${VERSION}" -o ${BUILD_DIR}/${BINARY_NAME} .
"""

[tasks."install:local"]
description = "Install release binary to ~/.local/bin"
depends = ["build:release"]
run = """
INSTALL_DIR="$HOME/.local/bin"
if [ ! -d "$INSTALL_DIR" ]; then
    echo "Error: $INSTALL_DIR does not exist"
    exit 1
fi
if ! echo "$PATH" | tr ':' '\n' | grep -qx "$INSTALL_DIR"; then
    echo "Error: $INSTALL_DIR is not on PATH"
    exit 1
fi
cp ${BUILD_DIR}/${BINARY_NAME} "$INSTALL_DIR/${BINARY_NAME}"
echo "Installed ${BINARY_NAME} to $INSTALL_DIR"
"""

[tasks.test]
description = "Run tests with race detection and coverage"
run = """
mkdir -p ${BUILD_DIR}
go test -v -race -coverprofile=${BUILD_DIR}/coverage.out ./...
"""

[tasks.lint]
description = "Run formatting check and vet"
run = """
UNFORMATTED=$(gofmt -l .)
if [ -n "$UNFORMATTED" ]; then
    echo "Files not formatted:"
    echo "$UNFORMATTED"
    exit 1
fi
go vet ./...
"""

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf ${BUILD_DIR}"

[tasks.ci]
description = "Run full CI pipeline"
depends = ["lint", "test"]
